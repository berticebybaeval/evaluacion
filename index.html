<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico de Gestión — Pymes Constructoras</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── PALETA CARBÓN + AZUL ── */
    :root {
      --bg:        #16161a;
      --surface:   #1f1f26;
      --surface2:  #27272f;
      --border:    #2e2e38;
      --accent:    #2f6fd4;
      --accent-bg: #1a2640;
      --accent-lt: #7ab3ff;
      --green:     #4aad5e;
      --green-bg:  #122218;
      --green-bd:  #1e4a2a;
      --amber:     #d97706;
      --amber-bg:  #1f1808;
      --amber-bd:  #4a3510;
      --red:       #e05555;
      --red-bg:    #1f1010;
      --red-bd:    #4a1c1c;
      --txt:       #eaeaf0;
      --txt2:      #9090a0;
      --txt3:      #5a5a6a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      background: var(--surface);
      border-radius: 16px;
      border: 0.5px solid var(--border);
      padding: 2rem;
      max-width: 680px;
      width: 100%;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.75rem;
      padding-bottom: 1.25rem;
      border-bottom: 0.5px solid var(--border);
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }

    .logo-text { font-size: 15px; font-weight: 500; color: var(--txt); }
    .logo-sub { font-size: 12px; color: var(--txt3); }

    .stage-indicator {
      display: flex;
      gap: 6px;
      margin-bottom: 1.75rem;
    }

    .stage-dot {
      height: 4px;
      flex: 1;
      border-radius: 2px;
      background: var(--surface2);
      transition: background 0.3s;
    }

    .stage-dot.active { background: var(--accent); }
    .stage-dot.done { background: var(--green); }

    .prog-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 1.75rem; }
    .prog-fill { height: 4px; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }

    .section-tag {
      font-size: 11px;
      font-weight: 500;
      color: var(--txt3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    h2 { font-size: 18px; font-weight: 500; color: var(--txt); margin-bottom: 0.25rem; }
    .subtitle { font-size: 13px; color: var(--txt2); margin-bottom: 1.5rem; line-height: 1.5; }

    /* Formulario */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.25rem;
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--txt2);
    }

    label .req { color: var(--red); margin-left: 2px; }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select {
      height: 38px;
      padding: 0 12px;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--txt);
      background: var(--surface2);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    select option { background: var(--surface2); color: var(--txt); }
    input:focus, select:focus { border-color: var(--accent); }
    input.error, select.error { border-color: var(--red); }

    .field-error {
      font-size: 11px;
      color: var(--red);
      display: none;
    }

    .field-error.show { display: block; }

    /* Opciones quiz */
    .opts { display: grid; gap: 8px; }

    .ob {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 12px 14px;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }

    .ob:hover { border-color: #4a4a5a; background: #2e2e3a; }
    .ob.sel { border-color: var(--accent); background: var(--accent-bg); }

    .oc {
      width: 18px;
      height: 18px;
      min-width: 18px;
      border-radius: 50%;
      border: 0.5px solid var(--txt3);
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .ob.sel .oc { background: var(--accent); border-color: var(--accent); }
    .od { width: 7px; height: 7px; border-radius: 50%; background: white; display: none; }
    .ob.sel .od { display: block; }
    .ot { font-size: 13px; color: var(--txt2); line-height: 1.45; }
    .ob.sel .ot { color: var(--accent-lt); }

    /* Navegación */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
    }

    .btn {
      padding: 9px 20px;
      border-radius: 8px;
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--txt2);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn:hover { background: var(--surface2); }

    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-primary:hover { opacity: 0.9; background: var(--accent); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-success {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    .btn-success:hover { opacity: 0.9; background: var(--green); }

    .nc { font-size: 12px; color: var(--txt3); }

    /* Resultado intermedio filtro */
    .result-box {
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    .result-box.qualified    { background: var(--green-bg); border: 0.5px solid var(--green-bd); }
    .result-box.borderline   { background: var(--amber-bg); border: 0.5px solid var(--amber-bd); }
    .result-box.disqualified { background: var(--red-bg);   border: 0.5px solid var(--red-bd);   }

    .result-score {
      font-size: 52px;
      font-weight: 500;
      color: var(--txt);
      line-height: 1;
      margin-bottom: 4px;
    }

    .result-label { font-size: 13px; color: var(--txt2); margin-bottom: 1rem; }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .badge-success { background: var(--green-bg); color: var(--green); border: 0.5px solid var(--green-bd); }
    .badge-warning { background: var(--amber-bg); color: var(--amber); border: 0.5px solid var(--amber-bd); }
    .badge-danger  { background: var(--red-bg);   color: var(--red);   border: 0.5px solid var(--red-bd);   }

    /* Barras de áreas */
    .rc {
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
    }

    .area-bar-wrap { margin-bottom: 0.6rem; }
    .area-bar-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .area-bar-name { font-size: 13px; color: var(--txt); font-weight: 500; }
    .area-bar-pct  { font-size: 12px; color: var(--txt2); }
    .area-bar      { height: 6px; background: var(--border); border-radius: 3px; }
    .area-bar-fill { height: 6px; border-radius: 3px; transition: width 0.6s ease; }

    /* CTA WhatsApp */
    .cta-block { border-radius: 12px; padding: 1.25rem 1.5rem; margin-top: 0.75rem; }
    .cta-s { background: var(--green-bg); border: 0.5px solid var(--green-bd); }
    .cta-w { background: var(--amber-bg); border: 0.5px solid var(--amber-bd); }
    .cta-d { background: var(--red-bg);   border: 0.5px solid var(--red-bd);   }
    .cta-h { font-size: 15px; font-weight: 500; margin-bottom: 6px; color: var(--txt); }
    .cta-b { font-size: 13px; color: var(--txt2); line-height: 1.5; margin-bottom: 1rem; }

    .btn-wa {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
    }

    .btn-wa:hover { opacity: 0.88; }

    .weak-list { list-style: none; padding: 0; margin: 0.75rem 0 0; }
    .weak-list li {
      font-size: 13px;
      color: var(--txt2);
      padding: 4px 0;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .weak-list li:last-child { border: none; }

    /* ── ADMIN PANEL ── */
    .admin-wrap { max-width: 1100px; width: 100%; }

    .admin-header {
      background: var(--surface);
      color: var(--txt);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-header h1 { font-size: 16px; font-weight: 500; }
    .admin-header p  { font-size: 12px; color: var(--txt3); margin-top: 2px; }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 1rem;
    }

    .stat-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
    }

    .stat-label { font-size: 11px; color: var(--txt3); margin-bottom: 4px; }
    .stat-val   { font-size: 24px; font-weight: 500; color: var(--txt); }

    .admin-table-wrap {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: auto;
    }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      background: var(--surface2);
      color: var(--txt3);
      font-weight: 500;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 0.5px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 9px 12px;
      border-bottom: 0.5px solid var(--border);
      color: var(--txt);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
    }

    .pill-green  { background: var(--green-bg); color: var(--green); }
    .pill-yellow { background: var(--amber-bg); color: var(--amber); }
    .pill-red    { background: var(--red-bg);   color: var(--red);   }
    .pill-gray   { background: var(--surface2); color: var(--txt2);  }

    .empty-admin {
      padding: 3rem;
      text-align: center;
      color: var(--txt3);
      font-size: 14px;
    }

    @media (max-width: 520px) {
      body { padding: 1rem 0.5rem; }
      .container { padding: 1.25rem; border-radius: 12px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     FLUJO PROSPECTO
══════════════════════════════════════════ -->
<div class="container" id="app">

  <div class="logo-row">
    <div class="logo-icon"><i class="ti ti-building"></i></div>
    <div>
      <div class="logo-text">Diagnóstico Integral para Empresas del Rubro Construcción</div>
      <div class="logo-sub">Evaluación de gestión empresarial</div>
    </div>
  </div>

  <div class="stage-indicator">
    <div class="stage-dot" id="sd1"></div>
    <div class="stage-dot" id="sd2"></div>
    <div class="stage-dot" id="sd3"></div>
    <div class="stage-dot" id="sd4"></div>
  </div>

  <div class="prog-bar" id="prog-bar" style="display:none">
    <div class="prog-fill" id="pf" style="width:0%"></div>
  </div>

  <div id="view"></div>
</div>

<!-- ══════════════════════════════════════════
     PANEL ADMIN
══════════════════════════════════════════ -->
<div class="admin-wrap" id="admin" style="display:none">

  <div class="admin-header">
    <div>
      <h1><i class="ti ti-database" style="margin-right:6px"></i>Panel de prospectos</h1>
      <p>Todos los registros capturados en el formulario</p>
    </div>
    <button class="btn btn-success" onclick="exportExcel()" style="display:flex;align-items:center;gap:6px">
      <i class="ti ti-file-spreadsheet"></i> Exportar a Excel
    </button>
  </div>

  <div class="admin-stats" id="admin-stats"></div>

  <div class="admin-table-wrap">
    <div id="admin-table"></div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════
   DATOS
═══════════════════════════════════════ */
const WA_NUMBER = '56962499101';
const DB_KEY    = 'prospectos_constructoras';

function loadDB()   { try { return JSON.parse(localStorage.getItem(DB_KEY) || '[]'); } catch(e){ return []; } }
function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

/* ═══════════════════════════════════════
   ROUTING
═══════════════════════════════════════ */
/* routing se ejecuta al final del script, después de todas las definiciones */

/* ═══════════════════════════════════════
   ESTADO GLOBAL
═══════════════════════════════════════ */
let contactData  = {};
let questionAns  = [];
let questionCur  = 0;
let diagAns      = [];
let diagCur      = 0;
let currentStage = 'landing';

/* ═══════════════════════════════════════
   FILTRO RÁPIDO — 7 PREGUNTAS
═══════════════════════════════════════ */
const FILTER_QS = [
  { q: '¿Qué describe mejor tu empresa constructora?', opts: [
    { t: 'Empresa con más de 5 años, proyectos activos y equipo formado', v: 3 },
    { t: 'Empresa de 2 a 5 años en proceso de consolidación', v: 2 },
    { t: 'Empresa menor de 2 años o en etapa de arranque', v: 1 },
    { t: 'Proyecto personal o empresa unipersonal sin equipo', v: 0 }
  ]},
  { q: '¿Cuentas con presupuesto para invertir en consultoría de gestión?', opts: [
    { t: 'Sí, tenemos presupuesto definido y aprobado', v: 3 },
    { t: 'Tenemos recursos, pero no están formalizados aún', v: 2 },
    { t: 'Presupuesto muy limitado; requeriría opciones flexibles', v: 1 },
    { t: 'No cuento con presupuesto disponible ahora', v: 0 }
  ]},
  { q: '¿Cuál es tu horizonte para tomar acción?', opts: [
    { t: 'Inmediato — quiero empezar este mes', v: 3 },
    { t: 'En los próximos 1 a 3 meses', v: 2 },
    { t: 'Más de 3 meses; aún evaluando opciones', v: 1 },
    { t: 'Solo estoy explorando, sin fecha definida', v: 0 }
  ]},
  { q: '¿Cuál es el principal dolor que quieres resolver hoy?', opts: [
    { t: 'Problemas urgentes de rentabilidad o flujo de caja en obra', v: 3 },
    { t: 'Ineficiencias operativas claras que nos generan pérdidas', v: 3 },
    { t: 'Queremos crecer pero no sabemos cómo escalar bien', v: 2 },
    { t: 'Exploración general de mejoras sin urgencia específica', v: 1 }
  ]},
  { q: '¿Quién toma las decisiones en tu empresa?', opts: [
    { t: 'Yo soy el decisor principal (dueño, socio o gerente general)', v: 3 },
    { t: 'Participo en la decisión junto a otro socio o directivo', v: 2 },
    { t: 'Soy ejecutor presentando opciones a quien decide', v: 1 },
    { t: 'No tengo claridad sobre el proceso de decisión', v: 0 }
  ]},
  { q: '¿Has trabajado antes con consultores o asesores externos?', opts: [

  ]},
  { q: '¿Qué tan involucrado estarías tú en el proceso de consultoría?', opts: [
    { t: 'Alto compromiso — dispuesto a dedicar tiempo, acceso e información', v: 3 },
    { t: 'Compromiso moderado — puedo participar con tiempo limitado', v: 2 },
    { t: 'Prefiero delegar y que el consultor trabaje de forma autónoma', v: 1 },
    { t: 'Aún no lo he pensado', v: 0 }
  ]}
];

/* ═══════════════════════════════════════
   DIAGNÓSTICO — 30 PREGUNTAS
═══════════════════════════════════════ */
const AREAS = [
  'Liderazgo y estructura organizacional',
  'Planificación y productividad en terreno',
  'Finanzas y flujo de caja',
  'Abastecimiento y subcontratos',
  'Calidad y prevención de riesgos',
  'Tecnología y digitalización'
];

const AREA_ICONS  = ['building','chart-bar','cash','truck','shield-check','device-laptop'];
const BAR_COLORS  = ['#185FA5','#0F6E56','#BA7517','#3B6D11','#993C1D','#534AB7'];

const DIAG_QS = [
  {a:0,q:'Si te ausentas dos semanas, ¿la obra sigue su curso normal o se paraliza?',opts:[
    {t:'La obra sigue sin problemas; el equipo está capacitado para tomar decisiones',v:3},
    {t:'Sigue, pero con dificultades y consultas frecuentes',v:2},
    {t:'Se generan retrasos importantes y el equipo pierde el norte',v:1},
    {t:'La obra prácticamente se detiene si no estoy presente',v:0}
  ]},
  {a:1,q:'¿Mides semanalmente el avance físico real de la obra versus lo que estaba planificado?',opts:[
    {t:'Sí, con indicadores formales (% real vs. planificado) y reporte semanal documentado',v:3},
    {t:'Hacemos seguimiento semanal pero sin indicadores claros ni registro formal',v:2},
    {t:'El control es mensual o solo cuando el mandante lo exige',v:1},
    {t:'No medimos; estimamos el avance visualmente en terreno',v:0}
  ]},
  {a:2,q:'¿Diferencias la utilidad "en el papel" de la liquidez real disponible para pagar nóminas y leyes sociales?',opts:[
    {t:'Sí, tenemos flujo de caja proyectado y diferenciamos claramente utilidad devengada de liquidez',v:3},
    {t:'Lo diferenciamos conceptualmente pero sin herramientas ni proceso formal',v:2},
    {t:'A veces confundimos facturación con disponibilidad; la falta de caja nos sorprende',v:1},
    {t:'No diferenciamos; hemos recurrido a créditos para pagar nóminas inesperadamente',v:0}
  ]},
  {a:2,q:'¿Conoces el margen real de utilidad de cada obra al momento de cerrarla?',opts:[
    {t:'Sí, cerramos cada obra con informe de costos vs. presupuesto y margen real documentado',v:3},

  {a:3,q:'¿Con qué frecuencia la obra se paraliza porque el material no llegó a tiempo a la bodega?',opts:[

    {t:'Es frecuente y nos genera retrasos y costos adicionales',v:1},
    {t:'Es un problema recurrente que paraliza la obra con regularidad',v:0}
  ]},
  {a:4,q:'¿Miden cuánto dinero pierden al mes en trabajos que hay que demoler y volver a hacer?',opts:[
    {t:'Sí, medimos el rework rate con datos y mantenemos acciones correctivas documentadas',v:3},
    {t:'Tenemos una estimación general pero sin medición formal por partida',v:2},
    {t:'Sabemos que hay reprocesos pero no cuantificamos el costo real',v:1},
    {t:'No lo medimos; los reprocesos se absorben como costo inevitable del negocio',v:0}
  ]},
  {a:5,q:'¿Controlan la gestión de obra con Excel y WhatsApp o ya tienen software especializado en construcción?',opts:[
    {t:'Usamos ERP o software especializado en construcción para proyectos, costos y compras',v:3},
    {t:'Usamos algunas herramientas digitales especializadas aunque no integradas entre sí',v:2},
    {t:'Excel avanzado y WhatsApp; funciona pero con limitaciones importantes',v:1},
    {t:'Solo Excel básico e información informal; perdemos datos con frecuencia',v:0}
  ]}
];

const REGIONES = [
  'Arica y Parinacota','Tarapacá','Antofagasta','Atacama','Coquimbo',
  'Valparaíso','Metropolitana','O\'Higgins','Maule','Ñuble','Biobío',
  'La Araucanía','Los Ríos','Los Lagos','Aysén','Magallanes'
];

const ESPECIALIDADES = [
  'Obras civiles','Edificación habitacional','Edificación comercial / oficinas',
  'Infraestructura vial','Obras industriales','Montaje e instalaciones',
  'Obras de sanitaria / agua potable','Paisajismo y urbanización','Otra'
];

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function pct(v, max) { return max > 0 ? Math.round((v / max) * 100) : 0; }

function updateStages(active) {
  const ind = document.querySelector('.stage-indicator');
  if (ind) ind.style.display = active === 0 ? 'none' : 'flex';
  ['sd1','sd2','sd3','sd4'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'stage-dot';
    if (i + 1 < active) el.classList.add('done');
    else if (i + 1 === active) el.classList.add('active');
  });
}

function setView(html) { document.getElementById('view').innerHTML = html; }

/* ═══════════════════════════════════════
   PANTALLA 2 — FILTRO DE CALIFICACIÓN (7 PREGUNTAS)

   ── INSTRUCCIÓN: Edita el array FILTER_QS (definido arriba en el código)
      para pegar tus 7 preguntas de calificación.
      Cada opción tiene campo "v" (valor): 0 = peor perfil, 3 = mejor perfil.
      scoreCalificacion = suma de las respuestas.  Max = 21.
      Umbral actual: scoreCalificacion >= 12 de 21 posibles → CALIFICA. ──
═══════════════════════════════════════ */
function startQuestions() {
  questionAns  = new Array(FILTER_QS.length).fill(null);
  questionCur  = 0;
  currentStage = 'questions';
  updateStages(1);
  document.getElementById('prog-bar').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q    = FILTER_QS[questionCur];
  const prog = Math.round(((questionCur + 1) / FILTER_QS.length) * 100);
  document.getElementById('pf').style.width = prog + '%';

  setView(`
    <div class="section-tag">Test de calificación — Pregunta ${questionCur + 1} de ${FILTER_QS.length}</div>
    <div style="font-size:17px;font-weight:500;color:var(--txt);margin-bottom:.75rem;line-height:1.45">${q.q}</div>
    <div class="opts">
      ${q.opts.map((o, i) => `
        <button class="ob${questionAns[questionCur] === i ? ' sel' : ''}" onclick="pickQuestion(${i})">
          <div class="oc"><div class="od"></div></div>
          <div class="ot">${o.t}</div>
        </button>
      `).join('')}
    </div>
    <div class="nav">
      ${questionCur > 0
        ? '<button class="btn" onclick="goQuestion(-1)">← Anterior</button>'
        : '<button class="btn" onclick="renderLanding()">← Volver</button>'}
      <span class="nc">${questionCur + 1} / ${FILTER_QS.length}</span>
      <button class="btn btn-primary" id="qnb" ${questionAns[questionCur] === null ? 'disabled' : ''} onclick="goQuestion(1)">
        ${questionCur === FILTER_QS.length - 1 ? 'Continuar →' : 'Siguiente →'}
      </button>
    </div>
  `);
}

function pickQuestion(i) {
  questionAns[questionCur] = i;
  document.querySelectorAll('.ob').forEach((b, j) => b.classList.toggle('sel', j === i));
  const nb = document.getElementById('qnb');
  if (nb) nb.disabled = false;
}

function goQuestion(d) {
  questionCur += d;
  if (questionCur >= FILTER_QS.length) { showContactForm(); return; }
  renderQuestion();
  window.scrollTo(0, 0);
}

/* scoreCalificacion: suma de los valores v[] de las respuestas del filtro */
function calcScoreCalificacion() {
  return questionAns.reduce((s, a, i) => a !== null ? s + FILTER_QS[i].opts[a].v : s, 0);
}

/* ═══════════════════════════════════════
   PANTALLA 4 — LÓGICA DE SALTO (invisible para el usuario)
   scoreCalificacion >= 12 → Pantalla 5B (CALIFICA)
   scoreCalificacion <  12 → Pantalla 5A (NO CALIFICA)
═══════════════════════════════════════ */
function submitContactAndScore() {
  const nombre     = document.getElementById('f-nombre').value.trim();
  const cargo      = document.getElementById('f-cargo').value.trim();
  const empresa    = document.getElementById('f-empresa').value.trim();
  const telefono   = document.getElementById('f-telefono').value.trim();
  const email      = document.getElementById('f-email').value.trim();
  const region     = document.getElementById('f-region').value;
  const especialidad = document.getElementById('f-especialidad').value;

  let ok = true;
  function validate(id, errId, cond) {
    const el  = document.getElementById(id);
    const err = document.getElementById(errId);
    if (!cond) { el.classList.add('error'); err.classList.add('show'); ok = false; }
    else        { el.classList.remove('error'); err.classList.remove('show'); }
  }

  validate('f-nombre',   'e-nombre',   nombre.length >= 2);
  validate('f-cargo',    'e-cargo',    cargo.length >= 2);
  validate('f-empresa',  'e-empresa',  empresa.length >= 2);
  validate('f-telefono', 'e-telefono', telefono.length >= 8);
  validate('f-email',    'e-email',    /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email));

  if (!ok) return;

  contactData = { nombre, cargo, empresa, telefono, email, region, especialidad, rut: '' };

  const scoreCalificacion = calcScoreCalificacion();        // max 21
  const filterPct         = pct(scoreCalificacion, FILTER_QS.length * 3);

  window.scrollTo(0, 0);

  if (scoreCalificacion >= 12) {          /* ≥ 57% → CALIFICA → Pantalla 5B */
    showResultB(filterPct);
  } else {                                /* <  57% → NO CALIFICA → Pantalla 5A */
    saveProspect(filterPct, 'No calificado', null, null, null);
    showResultA(filterPct);
  }
}

/* ═══════════════════════════════════════
   PANTALLA 5B — CALIFICADO + DIAGNÓSTICO (7 PREGUNTAS)

   ── INSTRUCCIÓN: Edita el array DIAG_QS (definido arriba en el código)
      para pegar tus 7 preguntas de diagnóstico de gestión.
      scoreDiagnostico = suma de los valores v[] de las respuestas.
      El resultado en Pantalla 6 es DINÁMICO según el puntaje obtenido. ──
═══════════════════════════════════════ */
function showResultB(filterPct) {
  currentStage = 'diag-intro';
  updateStages(3);

      <span class="badge badge-success">Perfil calificado — ${filterPct}%</span>
    </div>

      </p>
    </div>

function renderDiag() {
  const q    = DIAG_QS[diagCur];
  const prog = Math.round(((diagCur + 1) / DIAG_QS.length) * 100);
  document.getElementById('pf').style.width = prog + '%';

  setView(`
    <div class="section-tag">
      <i class="ti ti-${AREA_ICONS[q.a]}" style="font-size:12px;margin-right:4px"></i>
      Diagnóstico — Pregunta ${diagCur + 1} de ${DIAG_QS.length}
    </div>
    <div style="font-size:16px;font-weight:500;color:var(--txt);margin-bottom:.75rem;line-height:1.45">${q.q}</div>
    <div class="opts">
      ${q.opts.map((o, i) => `
        <button class="ob${diagAns[diagCur] === i ? ' sel' : ''}" onclick="pickDiag(${i})">
          <div class="oc"><div class="od"></div></div>
          <div class="ot">${o.t}</div>
        </button>
      `).join('')}
    </div>
    <div class="nav">
      ${diagCur > 0
        ? '<button class="btn" onclick="goDiag(-1)">← Anterior</button>'
        : '<span></span>'}
      <span class="nc">${diagCur + 1} / ${DIAG_QS.length}</span>
      <button class="btn btn-primary" id="dnb" ${diagAns[diagCur] === null ? 'disabled' : ''} onclick="goDiag(1)">
        ${diagCur === DIAG_QS.length - 1 ? 'Generar mi Evaluación →' : 'Siguiente →'}
      </button>
    </div>
  `);
}

function pickDiag(i) {
  diagAns[diagCur] = i;
  document.querySelectorAll('.ob').forEach((b, j) => b.classList.toggle('sel', j === i));
  const nb = document.getElementById('dnb');
  if (nb) nb.disabled = false;
}

function goDiag(d) {
  diagCur += d;
  if (diagCur >= DIAG_QS.length) { showFinalResult(); return; }
  renderDiag();
  window.scrollTo(0, 0);
}

function areaScore(a) {
  let s = 0, n = 0;
  DIAG_QS.forEach((q, i) => {
    if (q.a === a && diagAns[i] !== null) { s += DIAG_QS[i].opts[diagAns[i]].v; n++; }
  });
  return { score: s, max: n * 3 };
}

/* scoreDiagnostico: suma de los valores v[] de las 7 preguntas de diagnóstico */
function calcScoreDiagnostico() {
  return DIAG_QS.reduce((s, q, i) => diagAns[i] !== null ? s + DIAG_QS[i].opts[diagAns[i]].v : s, 0);
}

/* ═══════════════════════════════════════
   PANTALLA 6 — EVALUACIÓN FINAL + CTA WHATSAPP
   Mensaje dinámico según scoreDiagnostico.
   ── INSTRUCCIÓN: El número de WhatsApp se configura en WA_NUMBER
      al inicio del script. El href apunta a https://wa.me/WA_NUMBER ──
═══════════════════════════════════════ */
function showFinalResult() {
  document.getElementById('pf').style.width = '100%';
  currentStage = 'result-final';
  updateStages(4);

  const scoreDiagnostico = calcScoreDiagnostico();
  const MAX_DIAG         = DIAG_QS.length * 3;
  const diagPct          = pct(scoreDiagnostico, MAX_DIAG);
  const filterPct        = pct(calcScoreCalificacion(), FILTER_QS.length * 3);
  const aScores          = AREAS.map((_, a) => areaScore(a));

  /* Mensaje dinámico según scoreDiagnostico */
  let diagTier, tierBadge, ctaCls, mensajeDinamico, ctaSubtitulo;

  if (diagPct >= 65) {
    diagTier        = 'Gestión consolidada';
    tierBadge       = 'badge-success';
    ctaCls          = 'cta-s';
    mensajeDinamico = 'Tu empresa ya tiene una base sólida de gestión. La diferencia entre una buena constructora y una muy rentable está en los detalles: márgenes por obra, flujo de caja proyectado y productividad en terreno.';
    ctaSubtitulo    = 'En esta asesoría identificamos las palancas que más rentabilidad pueden darte en los próximos 6 meses.';
  } else if (diagPct >= 40) {
    diagTier        = 'Brechas críticas detectadas';
    tierBadge       = 'badge-warning';
    ctaCls          = 'cta-w';
    mensajeDinamico = 'Hemos detectado áreas críticas de mejora en tus operaciones y flujo de caja. Tu empresa tiene potencial real, pero hay fugas de rentabilidad que podemos identificar y cerrar rápidamente.';
    ctaSubtitulo    = 'Agenda tu asesoría y te mostramos exactamente qué priorizar para ver resultados en 90 días.';
  } else {
    diagTier        = 'Alto riesgo operacional';
    tierBadge       = 'badge-danger';
    ctaCls          = 'cta-d';
    mensajeDinamico = 'Hemos detectado vulnerabilidades severas en múltiples frentes de tu operación. El costo de no actuar hoy es mucho más alto que el de una asesoría: pérdida de margen, conflictos laborales y riesgo de liquidez.';
    ctaSubtitulo    = 'Esta asesoría puede ser el punto de inflexión para tu empresa. Te esperamos esta semana.';
  }

  const weakAreas = [...aScores.map((s, a) => ({ a, p: pct(s.score, s.max) }))]
    .filter(x => aScores[x.a].max > 0)
    .sort((x, y) => x.p - y.p)
    .slice(0, 3)
    .map(x => AREAS[x.a]);

  saveProspect(filterPct, 'Calificado', diagPct, diagTier, aScores);

  /* Botón principal de conversión: https://wa.me/WA_NUMBER?text=... */
  const waMsg = encodeURIComponent(
    `Hola, completé el Diagnóstico de Gestión para Constructoras.\n\n• Calificación: ${filterPct}%\n• Diagnóstico: ${diagPct}% — ${diagTier}\n• Áreas con brecha: ${weakAreas.join(', ')}\n\nMe gustaría agendar una asesoría de 45 minutos para revisar este resultado.`
  );
  const waUrl = `https://wa.me/${WA_NUMBER}?text=${waMsg}`;

  setView(`
    <div class="section-tag">Evaluación Final — Tu diagnóstico de gestión</div>
    <h2 style="margin-bottom:.25rem">Resultados de tu diagnóstico</h2>
    <p class="subtitle" style="margin-bottom:1.25rem">Basado en ${DIAG_QS.length} preguntas clave de tu operación</p>

    <div class="rc" style="margin-bottom:.75rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <div>
          <div style="font-size:12px;color:var(--txt2);margin-bottom:2px">Puntaje de gestión</div>
          <div style="display:flex;align-items:baseline;gap:6px">
            <span style="font-size:42px;font-weight:500;color:var(--txt);line-height:1">${diagPct}</span>
            <span style="font-size:18px;color:var(--txt2);font-weight:500">/ 100</span>
          </div>
        </div>
        <span class="badge ${tierBadge}">${diagTier}</span>
      </div>
      ${aScores.map((s, a) => {
        const p = pct(s.score, s.max);
        return `<div class="area-bar-wrap">
          <div class="area-bar-label">
            <span class="area-bar-name">
              <i class="ti ti-${AREA_ICONS[a]}" style="font-size:12px;margin-right:4px;color:var(--txt2)"></i>${AREAS[a]}
            </span>
            <span class="area-bar-pct">${p}%</span>
          </div>
          <div class="area-bar">
            <div class="area-bar-fill" style="width:${p}%;background:${BAR_COLORS[a]}"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="cta-block ${ctaCls}">
      <div class="cta-h">Agenda una asesoría de 45 minutos para revisar este diagnóstico a profundidad</div>
      <div class="cta-b">
        ${mensajeDinamico}<br><br>
        <em style="color:var(--txt2)">${ctaSubtitulo}</em>
      </div>
      <!-- ── BOTÓN PRINCIPAL DE CONVERSIÓN ── -->
      <a class="btn-wa" href="${waUrl}" target="_blank">
        <i class="ti ti-brand-whatsapp"></i> Agendar mi Asesoría por WhatsApp
      </a>
    </div>

    ${weakAreas.length > 0 ? `
    <div class="rc" style="margin-top:.75rem">
      <div style="font-size:13px;font-weight:500;color:var(--txt);margin-bottom:.5rem">
        Áreas con mayor brecha detectada
      </div>
      <ul class="weak-list">
        ${weakAreas.map(w => `<li><i class="ti ti-alert-triangle" style="color:var(--amber);font-size:13px"></i>${w}</li>`).join('')}
      </ul>
    </div>` : ''}

    <div style="margin-top:1.25rem;text-align:center">
      <button class="btn" onclick="restart()" style="font-size:12px;color:var(--txt3)">← Volver al inicio</button>
    </div>
  `);
}

/* ── URL de Google Sheets (Apps Script) ── */
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyUhIuDbjh2etMw--2M69raAzwBVfJuM_3faJPc9W8GL9c9HI7-jmUukL2emN7aDrOsjw/exec';

function saveProspect(filterPct, filterTier, diagPct, diagTier, aScores) {
  const db = loadDB();
  const now = new Date();
  const fecha = now.toLocaleDateString('es-CL') + ' ' + now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });

  const record = {
    fecha,
    nombre:      contactData.nombre      || '',
    email:       contactData.email       || '',
    telefono:    contactData.telefono    || '',
    empresa:     contactData.empresa     || '',
    rut:         contactData.rut         || '',
    cargo:       contactData.cargo       || '',
    region:      contactData.region      || '',
    especialidad: contactData.especialidad || '',
    filtro_pct:  filterPct,
    filtro_tier: filterTier || (filterPct >= 60 ? 'Calificado' : filterPct >= 35 ? 'En evaluación' : 'No calificado'),
    diag_pct:    diagPct !== null ? diagPct : '—',
    diag_tier:   diagTier || '—',
    area_liderazgo:     aScores ? pct(aScores[0].score, aScores[0].max) : '—',
    area_planificacion: aScores ? pct(aScores[1].score, aScores[1].max) : '—',
    area_finanzas:      aScores ? pct(aScores[2].score, aScores[2].max) : '—',
    area_abastecimiento:aScores ? pct(aScores[3].score, aScores[3].max) : '—',
    area_calidad:       aScores ? pct(aScores[4].score, aScores[4].max) : '—',
    area_tecnologia:    aScores ? pct(aScores[5].score, aScores[5].max) : '—',
  };

  /* Guardar en localStorage (respaldo local) */
  db.push(record);
  saveDB(db);

  /* Enviar a Google Sheets */
  fetch(SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(record)
  }).catch(() => {
    /* Si falla la red, el dato ya quedó en localStorage como respaldo */
  });
}

function restart() {
  contactData  = {};
  questionAns  = [];
  questionCur  = 0;
  diagAns      = [];
  diagCur      = 0;
  window.scrollTo(0, 0);
  renderLanding();
}

/* ═══════════════════════════════════════
   PANEL ADMIN
═══════════════════════════════════════ */
function renderAdmin() {
  document.body.style.alignItems = 'flex-start';
  document.getElementById('app').style.display   = 'none';
  document.getElementById('admin').style.display = 'block';

  const db = loadDB();

  const total       = db.length;
  const calificados = db.filter(r => r.filtro_pct >= 60).length;
  const conDiag     = db.filter(r => r.diag_pct !== '—').length;
  const avgDiag     = conDiag > 0
    ? Math.round(db.filter(r => r.diag_pct !== '—').reduce((s, r) => s + r.diag_pct, 0) / conDiag)
    : '—';

  function pill(p) {
    if (p === '—') return '<span class="pill pill-gray">—</span>';
    if (p >= 65)   return `<span class="pill pill-green">${p}%</span>`;
    if (p >= 40)   return `<span class="pill pill-yellow">${p}%</span>`;
    return `<span class="pill pill-red">${p}%</span>`;
  }

  function filterPill(p) {
    if (p >= 60) return `<span class="pill pill-green">${p}%</span>`;
    if (p >= 35) return `<span class="pill pill-yellow">${p}%</span>`;
    return `<span class="pill pill-red">${p}%</span>`;
  }

  const tableContent = db.length === 0
    ? '<div class="empty-admin"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:.5rem"></i>Aún no hay prospectos registrados.</div>'
    : `<table>
        <thead><tr>
          <th>Fecha</th><th>Nombre</th><th>Empresa</th><th>Cargo</th>
          <th>Email</th><th>Teléfono</th><th>Región</th><th>Especialidad</th><th>RUT</th>
          <th>Filtro</th><th>Diagnóstico</th><th>Clasificación</th>
          <th>Liderazgo</th><th>Planificación</th><th>Finanzas</th>
          <th>Abastecimiento</th><th>Calidad</th><th>Tecnología</th>
        </tr></thead>
        <tbody>
          ${[...db].reverse().map(r => `<tr>
            <td>${r.fecha}</td>
            <td><strong>${r.nombre}</strong></td>
            <td>${r.empresa || '—'}</td>
            <td>${r.cargo || '—'}</td>
            <td>${r.email}</td>
            <td>${r.telefono}</td>
            <td>${r.region || '—'}</td>
            <td>${r.especialidad || '—'}</td>
            <td>${r.rut || '—'}</td>
            <td>${filterPill(r.filtro_pct)}</td>
            <td>${pill(r.diag_pct)}</td>
            <td>${r.diag_tier !== '—' ? `<span style="font-size:11px;color:var(--txt2)">${r.diag_tier}</span>` : '—'}</td>
            <td>${pill(r.area_liderazgo)}</td>
            <td>${pill(r.area_planificacion)}</td>
            <td>${pill(r.area_finanzas)}</td>
            <td>${pill(r.area_abastecimiento)}</td>
            <td>${pill(r.area_calidad)}</td>
            <td>${pill(r.area_tecnologia)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;

  document.getElementById('admin').innerHTML = `
    <div class="admin-wrap" style="padding:1rem">
      <div class="admin-header">
        <div>
          <h1><i class="ti ti-database" style="margin-right:6px"></i>Panel de prospectos</h1>
          <p>Todos los registros capturados en el formulario</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-success" onclick="exportExcel()" style="display:flex;align-items:center;gap:6px">
            <i class="ti ti-file-spreadsheet"></i> Exportar a Excel
          </button>
          <button class="btn" onclick="adminLogout()" style="display:flex;align-items:center;gap:6px;color:var(--txt2)">
            <i class="ti ti-logout"></i> Salir
          </button>
        </div>
      </div>
      <div class="admin-stats">
        <div class="stat-card"><div class="stat-label">Total prospectos</div><div class="stat-val">${total}</div></div>
        <div class="stat-card"><div class="stat-label">Perfil calificado (≥60%)</div><div class="stat-val">${calificados}</div></div>
        <div class="stat-card"><div class="stat-label">Completaron diagnóstico</div><div class="stat-val">${conDiag}</div></div>
        <div class="stat-card"><div class="stat-label">Promedio diagnóstico</div><div class="stat-val">${avgDiag}${avgDiag !== '—' ? '%' : ''}</div></div>
      </div>
      <div class="admin-table-wrap">${tableContent}</div>
    </div>
  `;
}

function adminLogout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

/* ═══════════════════════════════════════
   EXPORTAR A EXCEL
═══════════════════════════════════════ */
function exportExcel() {
  const db = loadDB();
  if (db.length === 0) { alert('No hay datos para exportar.'); return; }

  const headers = [
    'Fecha','Nombre','Empresa','Cargo','Email','Teléfono','Región','Especialidad','RUT empresa',
    'Filtro perfil (%)','Diagnóstico (%)','Clasificación diagnóstico',
    'Liderazgo (%)','Planificación (%)','Finanzas (%)','Abastecimiento (%)','Calidad (%)','Tecnología (%)'
  ];

  const rows = db.map(r => [
    r.fecha, r.nombre, r.empresa, r.cargo, r.email, r.telefono, r.region, r.especialidad, r.rut,
    r.filtro_pct, r.diag_pct, r.diag_tier,
    r.area_liderazgo, r.area_planificacion, r.area_finanzas,
    r.area_abastecimiento, r.area_calidad, r.area_tecnologia
  ]);

  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);

  ws['!cols'] = headers.map((h, i) => ({ wch: i < 2 ? 22 : i < 9 ? 18 : 14 }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Prospectos');

  const fecha = new Date().toLocaleDateString('es-CL').replace(/\//g, '-');
  XLSX.writeFile(wb, `prospectos_constructoras_${fecha}.xlsx`);
}

/* ═══════════════════════════════════════
   ADMIN — CONTRASEÑA
   Para cambiar la contraseña:
   1. Abre la consola del navegador (F12)
   2. Ejecuta: hashPwd('tu_nueva_clave').then(h => console.log(h))
   3. Copia el hash resultante y reemplaza ADMIN_HASH abajo
═══════════════════════════════════════ */
const ADMIN_HASH = '8afee30d8e9ede277373166b29c8bf9878ec30ef8008db291aa92ef15ea4308e'; // contraseña por defecto: constructor2024

async function hashPwd(pwd) {
  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function renderAdminLogin(errorMsg) {
  document.getElementById('app').style.display   = 'none';
  document.getElementById('admin').style.display = 'block';
  document.getElementById('admin').innerHTML = `
    <div style="max-width:360px;margin:4rem auto">
      <div style="background:var(--surface);border:.5px solid var(--border);border-radius:16px;padding:2rem">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem">
          <div style="width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:18px">
            <i class="ti ti-lock"></i>
          </div>
          <div>
            <div style="font-size:15px;font-weight:500;color:var(--txt)">Panel de administración</div>
            <div style="font-size:12px;color:var(--txt3)">Acceso restringido</div>
          </div>
        </div>
        <div style="margin-bottom:1rem">
          <label style="font-size:12px;font-weight:500;color:var(--txt2);display:block;margin-bottom:5px">Contraseña</label>
          <input type="password" id="admin-pwd" placeholder="Ingresa tu contraseña"
            style="width:100%;height:38px;padding:0 12px;background:var(--surface2);color:var(--txt);border:.5px solid ${errorMsg ? 'var(--red)' : 'var(--border)'};border-radius:8px;font-size:14px;font-family:inherit;outline:none"
            onkeydown="if(event.key==='Enter')checkAdminPwd()" autofocus />
          ${errorMsg ? `<div style="font-size:11px;color:var(--red);margin-top:4px">${errorMsg}</div>` : ''}
        </div>
        <button onclick="checkAdminPwd()"
          style="width:100%;padding:9px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:14px;font-family:inherit;cursor:pointer">
          Ingresar
        </button>
      </div>
    </div>
  `;
}

async function checkAdminPwd() {
  const pwd  = document.getElementById('admin-pwd').value;
  const hash = await hashPwd(pwd);
  if (hash === ADMIN_HASH) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('admin').innerHTML = '';
    renderAdmin();
  } else {
    renderAdminLogin('Contraseña incorrecta. Intenta nuevamente.');
  }
}

/* ═══════════════════════════════════════
   ROUTING — al final, después de todas las definiciones
═══════════════════════════════════════ */
if (new URLSearchParams(location.search).get('admin') === '1') {
  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('app').style.display   = 'none';
    document.getElementById('admin').style.display = 'block';
    renderAdmin();
  } else {
    renderAdminLogin();
  }
} else {
  initApp();
}
</script>
